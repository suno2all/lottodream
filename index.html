<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title> 로또꿈꿔또 </title>

<style>

body{
font-family:sans-serif;
background:#f5f7ff;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

.container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

canvas{
background:#dff6ff;
border-radius:10px;
}

@keyframes scrollBackground {
  from { background-position: 0 0; }
  to { background-position: -1000px 0; }
}

#gameCanvas{
  background: url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=1000&auto=format&fit=crop');
  background-size: auto 100%;
  background-repeat: repeat-x;
  background-position: 0 0;
  border: 4px solid #2e7d32;
  animation: scrollBackground 20s linear infinite;
}

#dreamCanvas{
background:#fff8dc;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#4f6cff;
color:white;
cursor:pointer;
}

button:hover{
background:#354bd1;
}

#ranking{
text-align:left;
}

</style>
</head>

<body>

<h1>🌙 로또꿈꿔또 </h1>

<div class="container">

<!-- 꿈 해몽 -->
<div class="card">

<h2> 꿈해몽 + 로또</h2>

<input id="dreamInput" placeholder="꿈 내용을 입력하세요">
<button onclick="analyzeDream()">분석</button>

<p id="dreamText"></p>
<p id="lottoNumbers"></p>

<canvas id="dreamCanvas" width="300" height="200"></canvas>

</div>

<!-- 게임 -->
<div class="card">

<h2> 꽁치 와 고래 </h2>

<button onclick="startGame()">게임 시작</button>

<p>점수: <span id="score">0</span></p>

<canvas id="gameCanvas" width="400" height="200"></canvas>

</div>

<!-- 랭킹 -->
<div class="card">

<h2>🏆 랭킹</h2>

<div id="ranking"></div>

</div>

</div>

<script>

/* ---------------- DREAM SYSTEM ---------------- */

function randomNumbers(){

let nums=[]

while(nums.length<6){

let n=Math.floor(Math.random()*45)+1
if(!nums.includes(n)) nums.push(n)

}

return nums.sort((a,b)=>a-b)

}

function analyzeDream(){

let dream=document.getElementById("dreamInput").value

let meanings=[
"행운이 다가오는 꿈입니다",
"새로운 기회가 생길 수 있습니다",
"재물운 상승의 징조입니다",
"변화의 시작을 의미합니다",
"좋은 인연을 만날 수 있습니다"
]

let meaning=meanings[Math.floor(Math.random()*meanings.length)]

let nums=randomNumbers()

document.getElementById("dreamText").innerText="해몽: "+meaning
document.getElementById("lottoNumbers").innerText="추천 번호: "+nums.join(", ")

drawDream(nums)

}

function drawDream(nums){

let c=document.getElementById("dreamCanvas")
let ctx=c.getContext("2d")

ctx.clearRect(0,0,300,200)

ctx.font="40px serif"
ctx.fillText("🌙",20,80)
ctx.fillText("🐯",200,80)

ctx.font="20px sans-serif"

nums.forEach((n,i)=>{

ctx.fillText(n,30+i*40,150)

})

}

/* ---------------- GAME SYSTEM ---------------- */

let canvas=document.getElementById("gameCanvas")
let ctx=canvas.getContext("2d")

let cat={x:50,y:150,vy:0}
let gravity=0.8

let dogs=[]
let items=[]

let score=0
let gameRunning=false
let speed=3

let spawnTimer=0

function startGame(){

cat.y=150
cat.vy=0
dogs=[]
items=[]
score=0
speed=3
gameRunning=true

loop()

}

function jump(){

if(cat.y>=150){
cat.vy=-12
}

}

document.addEventListener("keydown",e=>{
if(e.code==="Space") jump()
})

canvas.addEventListener("click",jump)
canvas.addEventListener("touchstart",jump)

function spawn(){

spawnTimer++

if(spawnTimer>80){

spawnTimer=0

let r=Math.random()

// 강아지 낮은 확률
if(r<0.15){

dogs.push({x:420,y:150})

}

// 아이템
else{

let itemsList=[
{emoji:"🪙",value:500},
{emoji:"💵",value:10000},
{emoji:"💴",value:50000},
{emoji:"🎁",value:5000000},
{emoji:"🏅",value:10000000},
{emoji:"🚗",value:50000000},
{emoji:"🏠",value:1000000000}
]

let item=itemsList[Math.floor(Math.random()*itemsList.length)]

items.push({x:420,y:150,emoji:item.emoji,value:item.value})

}

}

}

function update(){

cat.vy+=gravity
cat.y+=cat.vy

if(cat.y>150){
cat.y=150
cat.vy=0
}

spawn()

// dogs
dogs.forEach((d,i)=>{

d.x-=speed

if(d.x<0) dogs.splice(i,1)

if(Math.abs(d.x-cat.x)<20 && cat.y>130){

endGame()

}

})

// items
items.forEach((it,i)=>{

it.x-=speed

if(it.x<0) items.splice(i,1)

if(Math.abs(it.x-cat.x)<20){

score+=it.value
items.splice(i,1)

}

})

let level=Math.floor(score/100000000)

speed=3*(1+level*0.1)

}

function draw(){

ctx.clearRect(0,0,400,200)

ctx.font="30px serif"
ctx.fillText("🐱",cat.x,cat.y)

ctx.font="40px serif"
dogs.forEach(d=>ctx.fillText("🐶",d.x,d.y))

ctx.font="25px serif"
items.forEach(it=>ctx.fillText(it.emoji,it.x,it.y))

document.getElementById("score").innerText=
score.toLocaleString()+" 원"

}

function loop(){

if(!gameRunning) return

update()
draw()

requestAnimationFrame(loop)

}

function endGame(){

gameRunning=false

let name=prompt("이름 입력")

if(!name) name="익명"

saveRanking(name,score)

showRanking()

}

/* ---------------- RANKING ---------------- */

function saveRanking(name,score){

let ranking=JSON.parse(localStorage.getItem("ranking")||"[]")

ranking.push({name,score})

ranking.sort((a,b)=>b.score-a.score)

ranking=ranking.slice(0,10)

localStorage.setItem("ranking",JSON.stringify(ranking))

}

function showRanking(){

let ranking=JSON.parse(localStorage.getItem("ranking")||"[]")

let html=""

ranking.forEach((r,i)=>{

html+=`${i+1}. ${r.name} - ${r.score.toLocaleString()} 원<br>`

})

document.getElementById("ranking").innerHTML=html

}

showRanking()

</script>

</body>
</html>
