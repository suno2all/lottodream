<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title> 로또꿈꿔또 </title>

<style>

body{
font-family: 'Pretendard', sans-serif;
background:#f0f2f5;
text-align:center;
margin:0;
color: #333;
}

h1{
margin-top:40px;
font-size: 2.5em;
color: #1a237e;
text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
}

.container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:40px 20px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
width: 450px;
transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
}

h2 {
    color: #3949ab;
    margin-bottom: 20px;
    font-size: 1.5em;
}

canvas{
background:#f8f9fa;
border-radius:15px;
margin-top: 20px;
box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
}

@keyframes scrollBackground {
  from { background-position: 0 0; }
  to { background-position: -2000px 0; }
}

#gameCanvas{
  background-color: #e8f5e9;
  background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'), 
                    url('https://images.unsplash.com/photo-1541675154750-0444c7d51e8e?q=80&w=1000&auto=format&fit=crop');
  background-size: auto, cover;
  background-repeat: repeat, repeat-x;
  background-position: 0 0;
  border: 5px solid #4e342e;
  animation: scrollBackground 100s linear infinite;
  filter: sepia(0.2) contrast(1.1) brightness(1.0);
}

#dreamCanvas{
    border: 1px solid #e0e0e0;
}

#dreamInput {
    padding: 12px 20px;
    width: 250px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s;
}

#dreamInput:focus {
    border-color: #3949ab;
}

#analyzeBtn {
padding: 12px 25px;
border:none;
border-radius:12px;
background:#3949ab;
color:white;
cursor:pointer;
font-weight: bold;
font-size: 16px;
margin-left: 10px;
transition: all 0.3s;
}

#analyzeBtn:hover:not(:disabled){
background:#1a237e;
}

#analyzeBtn:disabled {
    background: #ccc;
    cursor: not-allowed;
}

#dreamText, #lottoNumbers {
    margin: 15px 0;
    font-weight: bold;
    color: #555;
}

#score {
    font-size: 1.2em;
    color: #d32f2f;
    font-weight: 800;
}

#ranking{
text-align:left;
padding: 10px;
line-height: 1.8;
}

.loading-text {
    font-size: 14px;
    color: #3949ab;
    margin-top: 10px;
    font-weight: bold;
    display: none;
}

</style>
</head>

<body>

<h1>🌙 로또꿈꿔또 </h1>

<div class="container">

<!-- 꿈 해몽 -->
<div class="card">

<h2> ✨ 꿈해몽 AI 삽화 + 로또 ✨</h2>

<div style="margin-bottom: 20px;">
    <input id="dreamInput" placeholder="어젯밤 어떤 꿈을 꾸셨나요?">
    <button id="analyzeBtn" onclick="analyzeDream()">분석하기</button>
</div>

<p id="statusMsg" class="loading-text">AI가 꿈을 삽화로 그리고 있습니다. 기다리는 동안 고양이의 산책 게임을 즐겨보세요!</p>

<canvas id="dreamCanvas" width="400" height="300"></canvas>

<div id="dreamResult" style="margin-top: 20px; display: none;">
    <p id="dreamText"></p>
    <p id="lottoNumbers"></p>
</div>

</div>

<!-- 게임 -->
<div class="card">

<h2> 🐱 고양이의 산책 🐱</h2>

<button onclick="startGame()">게임 시작</button>

<p>점수: <span id="score">0</span> 원</p>

<canvas id="gameCanvas" width="400" height="200"></canvas>

<p style="font-size: 0.8em; color: #888; margin-top: 10px;">[Space] 키 또는 화면 클릭으로 점프하세요!</p>

</div>

<!-- 랭킹 -->
<div class="card">

<h2>🏆 명예의 전당</h2>

<div id="ranking"></div>

</div>

</div>

<script>

/* ---------------- DREAM SYSTEM ---------------- */

function randomNumbers(){
    let nums=[]
    while(nums.length<6){
        let n=Math.floor(Math.random()*45)+1
        if(!nums.includes(n)) nums.push(n)
    }
    return nums.sort((a,b)=>a-b)
}

async function analyzeDream(){
    let dream = document.getElementById("dreamInput").value;
    let btn = document.getElementById("analyzeBtn");
    let statusMsg = document.getElementById("statusMsg");
    
    if(!dream) { alert("꿈 내용을 입력해 주세요!"); return; }

    btn.disabled = true;
    statusMsg.style.display = "block";
    
    // 캔버스 초기화 및 대기 화면
    let c = document.getElementById("dreamCanvas");
    let ctx = c.getContext("2d");
    ctx.fillStyle = "#1a237e";
    ctx.fillRect(0, 0, 400, 300);
    ctx.font = "18px 'Pretendard', sans-serif";
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.fillText("AI가 꿈의 내용을 분석하여", 200, 130);
    ctx.fillText("멋진 삽화를 그리고 있습니다...", 200, 160);

    let meanings = [
        "엄청난 재물운이 따를 길몽입니다!",
        "뜻밖의 행운이 당신을 기다리고 있네요.",
        "간절히 원하던 일이 드디어 결실을 맺습니다.",
        "인생의 소중한 귀인을 만나게 될 징조입니다.",
        "새로운 시작과 긍정적인 변화가 찾아옵니다.",
        "걱정거리가 사라지고 마음이 평온해질 꿈입니다."
    ];

    let meaning = meanings[Math.floor(Math.random()*meanings.length)];
    let nums = randomNumbers();

    // AI 이미지 생성 (Pollinations AI)
    const prompt = encodeURIComponent(dream + " anime style fantasy dream illustration bright colors high quality 4k digital art");
    const imageUrl = `https://image.pollinations.ai/prompt/${prompt}?width=400&height=300&nologo=true`;

    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = imageUrl;

    img.onload = function() {
        drawDreamIllustration(img, meaning, nums);
        document.getElementById("dreamResult").style.display = "block";
        document.getElementById("dreamText").innerText = "해몽: " + meaning;
        document.getElementById("lottoNumbers").innerText = "추천 번호: " + nums.join(", ");
        btn.disabled = false;
        statusMsg.style.display = "none";
    };

    img.onerror = function() {
        // 이미지 로드 실패 시 기본 이모지 모드로 대체
        drawDreamIllustration(null, meaning, nums);
        btn.disabled = false;
        statusMsg.style.display = "none";
        alert("AI 이미지 생성 중 오류가 발생하여 기본 테마로 대체합니다.");
    };
}

function drawDreamIllustration(img, meaning, nums) {
    let c = document.getElementById("dreamCanvas");
    let ctx = c.getContext("2d");
    
    if (img) {
        ctx.drawImage(img, 0, 0, 400, 300);
        // 이미지 위에 반투명 오버레이 (텍스트 가독성)
        ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
        ctx.fillRect(0, 210, 400, 90);
    } else {
        // 배경 그라데이션
        let grad = ctx.createLinearGradient(0, 0, 0, 300);
        grad.addColorStop(0, "#1a237e");
        grad.addColorStop(1, "#3f51b5");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 400, 300);
        
        ctx.font = "100px serif";
        ctx.textAlign = "center";
        ctx.fillText("🌟", 200, 140);
    }

    // 해몽 텍스트
    ctx.font = "bold 16px 'Pretendard', sans-serif";
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "center";
    ctx.shadowBlur = 4;
    ctx.shadowColor = "black";
    ctx.fillText(meaning, 200, 235);
    ctx.shadowBlur = 0;

    // 로또 공 디자인
    let colors = ["#fbc02d", "#1976d2", "#d32f2f", "#7b1fa2", "#388e3c"];
    nums.forEach((n, i) => {
        let x = 65 + i * 54;
        let y = 270;
        
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI*2);
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        ctx.shadowBlur = 0;
        
        ctx.font = "bold 16px Arial";
        ctx.fillStyle = "white";
        ctx.fillText(n, x, y + 6);
    });
}

// 초기 안내 화면 그리기
window.onload = function() {
    let c = document.getElementById("dreamCanvas");
    let ctx = c.getContext("2d");
    ctx.fillStyle = "#3f51b5";
    ctx.fillRect(0, 0, 400, 300);
    ctx.font = "20px 'Pretendard', sans-serif";
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.fillText("꿈 내용을 입력하고", 200, 140);
    ctx.fillText("분석하기 버튼을 눌러보세요!", 200, 170);
}

/* ---------------- GAME SYSTEM ---------------- */

let canvas=document.getElementById("gameCanvas")
let ctx=canvas.getContext("2d")

let cat={x:50,y:150,vy:0}
let gravity=0.8

let dogs=[]
let items=[]

let score=0
let gameRunning=false
let speed=3

let spawnTimer=0

function startGame(){
    cat.y=150
    cat.vy=0
    dogs=[]
    items=[]
    score=0
    speed=3
    gameRunning=true
    loop()
}

function jump(){
    if(cat.y>=150){
        cat.vy=-12
    }
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space") jump()
})

canvas.addEventListener("click",jump)
canvas.addEventListener("touchstart",jump)

function spawn(){
    spawnTimer++
    if(spawnTimer>80){
        spawnTimer=0
        let r=Math.random()
        if(r<0.15){
            dogs.push({x:420,y:150})
        }
        else{
            let itemsList=[
                {emoji:"🪙",value:500},
                {emoji:"💵",value:10000},
                {emoji:"💴",value:50000},
                {emoji:"🎁",value:5000000},
                {emoji:"🏅",value:10000000},
                {emoji:"🚗",value:50000000},
                {emoji:"🏠",value:1000000000}
            ]
            let item=itemsList[Math.floor(Math.random()*itemsList.length)]
            items.push({x:420,y:150,emoji:item.emoji,value:item.value})
        }
    }
}

function update(){
    cat.vy+=gravity
    cat.y+=cat.vy
    if(cat.y>150){
        cat.y=150
        cat.vy=0
    }
    spawn()
    dogs.forEach((d,i)=>{
        d.x-=speed
        if(d.x<0) dogs.splice(i,1)
        if(Math.abs(d.x-cat.x)<20 && cat.y>130){
            endGame()
        }
    })
    items.forEach((it,i)=>{
        it.x-=speed
        if(it.x<0) items.splice(i,1)
        if(Math.abs(it.x-cat.x)<20){
            score+=it.value
            items.splice(i,1)
        }
    })
    let level=Math.floor(score/100000000)
    speed=3*(1+level*0.1)
}

function draw(){
    ctx.clearRect(0,0,400,200)
    ctx.font="30px serif"
    ctx.fillText("🐱",cat.x,cat.y)
    ctx.font="40px serif"
    dogs.forEach(d=>ctx.fillText("🐶",d.x,d.y))
    ctx.font="25px serif"
    items.forEach(it=>ctx.fillText(it.emoji,it.x,it.y))
    document.getElementById("score").innerText = score.toLocaleString()
}

function loop(){
    if(!gameRunning) return
    update()
    draw()
    requestAnimationFrame(loop)
}

function endGame(){
    gameRunning=false
    let name=prompt("게임 오버! 이름을 입력해 주세요.")
    if(!name) name="익명"
    saveRanking(name,score)
    showRanking()
}

/* ---------------- RANKING ---------------- */

function saveRanking(name,score){
    let ranking=JSON.parse(localStorage.getItem("ranking")||"[]")
    ranking.push({name,score})
    ranking.sort((a,b)=>b.score-a.score)
    ranking=ranking.slice(0,10)
    localStorage.setItem("ranking",JSON.stringify(ranking))
}

function showRanking(){
    let ranking=JSON.parse(localStorage.getItem("ranking")||"[]")
    let html=""
    ranking.forEach((r,i)=>{
        html+=`${i+1}. ${r.name} - ${r.score.toLocaleString()} 원<br>`
    })
    document.getElementById("ranking").innerHTML=html || "아직 랭킹이 없습니다. 첫 번째 주인공이 되어보세요!"
}

showRanking()

</script>

</body>
</html>
